<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 1 - Javascript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">

                <h1 class="mb-4 text-primary fw-bold">🎯 Ruleta de Participantes</h1>
                <p class="text-muted mb-5">Haz clic en el botón para seleccionar a un participante al azar de la lista.
                </p>

                <div class="card shadow-sm mb-4">
                    <div class="card-body d-flex align-items-center justify-content-center resultado-box">
                        <h2 id="resultado" class="text-secondary m-0">¡Presiona el botón para comenzar!</h2>
                    </div>
                </div>

                <button id="getRandom" class="btn btn-primary btn-lg px-5 shadow-sm fw-bold">
                    🎲 Lanzar Ruleta
                </button>

            </div>
        </div>
    </div>
    <script src="./assets/js/mascota.js"></script>

</html>
